# Shattered Dominion Pixel Dungeon — locations para o nginx do host.
#
# NÃO é um arquivo standalone: incluir os dois blocos DENTRO do server
# block existente de www.pixelforgegames.com.br (443), sem tocar nos
# locations dos outros apps.
#
# Aplicação (sempre nesta ordem):
#   1. backup:  sudo cp /etc/nginx/conf.d/default.conf /etc/nginx/conf.d/default.conf.bak-$(date +%F)
#   2. editar:  colar os blocos abaixo no server block do www.
#   3. validar: sudo nginx -t
#   4. aplicar: sudo systemctl reload nginx   # NUNCA restart — nginx é compartilhado

# ── cliente estático ────────────────────────────────────────────────
# URL pública: https://www.pixelforgegames.com.br/shattered-dominion/
location /shattered-dominion/ {
    alias /var/www/shattered-dominion/;
    try_files $uri $uri/ /shattered-dominion/index.html;
}

# SÓ os bundles js/css do Vite (nome com hash) ganham cache imutável.
# A arte do jogo (assets/tiles|sprites|items) tem nome ESTÁVEL — fica no
# cache padrão para não servir sprite velho depois de um deploy.
# root (não alias): com regex, alias exigiria captura; aqui o prefixo da
# URL coincide com o diretório em /var/www, então root resolve direto.
location ~* ^/shattered-dominion/assets/.+\.(js|css)$ {
    root /var/www;
    add_header Cache-Control "public, max-age=31536000, immutable";
}

# ── WebSocket + matchmaking do Colyseus ─────────────────────────────
# O cliente usa wss://www.pixelforgegames.com.br/shattered-dominion-ws/
# (VITE_WS_ENDPOINT). Receita oficial do Colyseus para o upgrade.
location /shattered-dominion-ws/ {
    proxy_pass http://127.0.0.1:3005/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # sessões de jogo são longas — sem esses timeouts o nginx derruba
    # o socket ocioso e o cliente cai no fluxo de reconexão à toa
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
}
