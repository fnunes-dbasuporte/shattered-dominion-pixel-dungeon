<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shattered Dominion Pixel Dungeon</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #0b0a10;
        color: #e8e6f0;
        font-family: monospace;
      }
      #app {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100%;
      }
      canvas {
        image-rendering: pixelated;
      }

      /* ── lobby (DOM sobre o canvas) ── */
      #ui {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0b0a10;
        z-index: 10;
      }
      #ui.hidden {
        display: none;
      }
      .card {
        background: #17141f;
        border: 1px solid #2c2740;
        border-radius: 8px;
        padding: 28px 32px;
        width: min(420px, 90vw);
        display: flex;
        flex-direction: column;
        gap: 14px;
      }
      .card h1 {
        font-size: 18px;
        margin: 0 0 6px;
        letter-spacing: 1px;
        text-align: center;
      }
      .card h1 small {
        display: block;
        color: #9a96ad;
        font-size: 11px;
        margin-top: 4px;
        letter-spacing: 0;
      }
      .card label {
        font-size: 12px;
        color: #9a96ad;
      }
      .card input {
        width: 100%;
        box-sizing: border-box;
        background: #0b0a10;
        color: #e8e6f0;
        border: 1px solid #2c2740;
        border-radius: 4px;
        padding: 10px;
        font-family: monospace;
        font-size: 14px;
      }
      .card input#codigo {
        text-transform: uppercase;
        letter-spacing: 4px;
      }
      .card button {
        background: #4da3e8;
        color: #0b0a10;
        border: 0;
        border-radius: 4px;
        padding: 11px;
        font-family: monospace;
        font-size: 14px;
        font-weight: bold;
        cursor: pointer;
      }
      .card button:hover {
        filter: brightness(1.15);
      }
      .card button.secundario {
        background: #2c2740;
        color: #e8e6f0;
      }
      .card button:disabled {
        opacity: 0.45;
        cursor: default;
      }
      .divisor {
        text-align: center;
        color: #55506b;
        font-size: 12px;
      }
      .erro {
        color: #e8554d;
        font-size: 12px;
        min-height: 15px;
        margin: 0;
      }
      .codigo-sala {
        font-size: 34px;
        letter-spacing: 10px;
        text-align: center;
        color: #e8c04d;
        margin: 4px 0;
        user-select: all;
      }
      .jogadores {
        list-style: none;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        gap: 4px;
        font-size: 13px;
      }
      .jogadores li::before {
        content: "◆ ";
        color: #5fce6b;
      }
      .dica {
        color: #9a96ad;
        font-size: 12px;
        text-align: center;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="ui"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
