<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shattered Dominion Pixel Dungeon</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #0b0a10;
        color: #e8e6f0;
        font-family: monospace;
      }
      #app {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100%;
      }
      canvas {
        image-rendering: pixelated;
      }

      /* ── lobby (DOM sobre o canvas) ── */
      #ui {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0b0a10;
        z-index: 10;
      }
      #ui.hidden {
        display: none;
      }
      .card {
        background: #17141f;
        border: 14px solid transparent;
        border-image: url("assets/ui/panel.png") 32 round;
        image-rendering: pixelated;
        padding: 20px 24px;
        width: min(420px, 90vw);
        display: flex;
        flex-direction: column;
        gap: 14px;
      }
      .card h1 {
        font-size: 18px;
        margin: 0 0 6px;
        letter-spacing: 1px;
        text-align: center;
      }
      .card h1 small {
        display: block;
        color: #9a96ad;
        font-size: 11px;
        margin-top: 4px;
        letter-spacing: 0;
      }
      .card label {
        font-size: 12px;
        color: #9a96ad;
      }
      .card input {
        width: 100%;
        box-sizing: border-box;
        background: #0b0a10;
        color: #e8e6f0;
        border: 1px solid #2c2740;
        border-radius: 4px;
        padding: 10px;
        font-family: monospace;
        font-size: 14px;
      }
      .card input#codigo {
        text-transform: uppercase;
        letter-spacing: 4px;
      }
      .card button {
        background: #4da3e8;
        color: #0b0a10;
        border: 0;
        border-radius: 4px;
        padding: 11px;
        font-family: monospace;
        font-size: 14px;
        font-weight: bold;
        cursor: pointer;
      }
      .card button:hover {
        filter: brightness(1.15);
      }
      .card button.secundario {
        background: #2c2740;
        color: #e8e6f0;
      }
      .card button:disabled {
        opacity: 0.45;
        cursor: default;
      }
      .divisor {
        text-align: center;
        color: #55506b;
        font-size: 12px;
      }
      .erro {
        color: #e8554d;
        font-size: 12px;
        min-height: 15px;
        margin: 0;
      }
      .codigo-sala {
        font-size: 34px;
        letter-spacing: 10px;
        text-align: center;
        color: #e8c04d;
        margin: 4px 0;
        user-select: all;
      }
      .jogadores {
        list-style: none;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        gap: 4px;
        font-size: 13px;
      }
      .cores {
        display: flex;
        gap: 8px;
      }
      .cor {
        width: 26px;
        height: 26px;
        border-radius: 50%;
        border: 2px solid transparent;
        cursor: pointer;
        padding: 0;
      }
      .cor.ativa {
        border-color: #ffffff;
      }
      .dica {
        color: #9a96ad;
        font-size: 12px;
        text-align: center;
        margin: 0;
      }

      /* ── inventário ── */
      #inv {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(11, 10, 16, 0.72);
        z-index: 20;
        font-family: monospace;
      }
      .inv-card {
        background: #17141f;
        border: 14px solid transparent;
        border-image: url("assets/ui/panel.png") 32 round;
        image-rendering: pixelated;
        padding: 12px 14px;
        width: min(640px, 94vw);
      }
      .inv-head {
        color: #e8c04d;
        font-size: 14px;
        margin-bottom: 12px;
        text-align: center;
      }
      .inv-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 8px;
      }
      .inv-slot {
        background: #0b0a10;
        border: 1px solid #2c2740;
        border-radius: 6px;
        min-height: 86px;
        padding: 6px;
        display: flex;
        flex-direction: column;
        gap: 4px;
        font-size: 11px;
      }
      .inv-slot.vazio {
        opacity: 0.35;
      }
      .inv-slot.alvo {
        cursor: pointer;
        border-color: #e8c04d;
      }
      .inv-icon {
        width: 32px;
        height: 32px;
        image-rendering: pixelated;
      }
      .cat-weapon {
        color: #cfd2d8;
      }
      .cat-armor {
        color: #8f9bb3;
      }
      .cat-potion {
        color: #b35de8;
      }
      .cat-scroll {
        color: #e8c04d;
      }
      .cat-food {
        color: #b3854d;
      }
      .inv-label {
        color: #e8e6f0;
        flex: 1;
      }
      .equipado {
        color: #5fce6b;
      }
      .inv-actions {
        display: flex;
        gap: 4px;
      }
      .inv-actions button {
        flex: 1;
        background: #4da3e8;
        color: #0b0a10;
        border: 0;
        border-radius: 3px;
        padding: 4px 2px;
        font-family: monospace;
        font-size: 10px;
        font-weight: bold;
        cursor: pointer;
      }
      .inv-actions button.secundario {
        background: #2c2740;
        color: #9a96ad;
      }
      .inv-hint {
        color: #55506b;
        font-size: 11px;
        text-align: center;
        margin-top: 10px;
      }

      /* ── chat ── */
      #chat {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 64px;
        display: flex;
        justify-content: center;
        z-index: 15;
      }
      #chat input {
        width: min(480px, 90vw);
        background: rgba(23, 20, 31, 0.95);
        color: #e8e6f0;
        border: 1px solid #4da3e8;
        border-radius: 6px;
        padding: 10px 12px;
        font-family: monospace;
        font-size: 13px;
        outline: none;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="ui"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
