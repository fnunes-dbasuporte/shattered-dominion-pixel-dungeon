<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shattered Dominion Pixel Dungeon</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #0b0a10;
        color: #e8e6f0;
        font-family: monospace;
      }
      #app {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100%;
      }
      canvas {
        image-rendering: pixelated;
      }

      /* ── lobby (DOM sobre o canvas) ── */
      #ui {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0b0a10;
        z-index: 10;
      }
      #ui.hidden {
        display: none;
      }
      .card {
        background: #17141f;
        border: 14px solid transparent;
        border-image: url("assets/ui/panel.png") 32 round;
        image-rendering: pixelated;
        padding: 26px 28px 24px;
        width: min(440px, 92vw);
        display: flex;
        flex-direction: column;
        gap: 22px;
      }
      .card h1 {
        font-size: 18px;
        margin: 0;
        letter-spacing: 1px;
        text-align: center;
      }
      .card h1 small {
        display: block;
        color: #9a96ad;
        font-size: 11px;
        margin-top: 9px;
        letter-spacing: 0;
      }
      /* Cada painel espaça seus próprios blocos; o .card só separa título de painel. */
      .painel {
        display: flex;
        flex-direction: column;
        gap: 18px;
      }
      /* Rótulo colado no seu controle, longe do bloco seguinte. */
      .campo {
        display: flex;
        flex-direction: column;
        gap: 7px;
      }
      .oculto {
        display: none !important;
      }
      .card label {
        font-size: 12px;
        color: #9a96ad;
        letter-spacing: 0.5px;
      }
      .card input {
        width: 100%;
        box-sizing: border-box;
        background: #0b0a10;
        color: #e8e6f0;
        border: 1px solid #2c2740;
        border-radius: 4px;
        padding: 11px 12px;
        font-family: monospace;
        font-size: 14px;
      }
      .card input:focus {
        outline: none;
        border-color: #4da3e8;
      }
      .card input#codigo {
        text-transform: uppercase;
        letter-spacing: 4px;
      }
      .card button {
        background: #4da3e8;
        color: #0b0a10;
        border: 0;
        border-radius: 4px;
        padding: 13px;
        font-family: monospace;
        font-size: 14px;
        font-weight: bold;
        letter-spacing: 0.5px;
        cursor: pointer;
      }
      .card button:hover {
        filter: brightness(1.15);
      }
      .card button.secundario {
        background: #2c2740;
        color: #e8e6f0;
      }
      .card button:disabled {
        opacity: 0.45;
        cursor: default;
      }
      /* Separador com filete dos dois lados — dá ar entre os dois caminhos. */
      .divisor {
        display: flex;
        align-items: center;
        gap: 12px;
        color: #55506b;
        font-size: 12px;
        margin: 2px 0;
      }
      .divisor::before,
      .divisor::after {
        content: "";
        flex: 1;
        height: 1px;
        background: #2c2740;
      }
      .erro {
        color: #e8554d;
        font-size: 12px;
        min-height: 15px;
        margin: 0;
        text-align: center;
      }
      .codigo-sala {
        font-size: 34px;
        letter-spacing: 10px;
        /* o letter-spacing sobra à direita da última letra: compensa e centra */
        text-indent: 10px;
        text-align: center;
        color: #e8c04d;
        margin: 0;
        user-select: all;
      }
      .jogadores {
        list-style: none;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        gap: 9px;
        font-size: 13px;
      }
      .cores {
        display: flex;
        gap: 12px;
        padding: 2px 0;
      }
      .cor {
        width: 26px;
        height: 26px;
        border-radius: 50%;
        border: 0;
        cursor: pointer;
        padding: 0;
      }
      /* anel POR FORA do círculo: marcar a cor não muda o espaçamento da fileira */
      .cor.ativa {
        box-shadow:
          0 0 0 2px #0b0a10,
          0 0 0 4px #ffffff;
      }
      .dica {
        color: #9a96ad;
        font-size: 12px;
        text-align: center;
        margin: 0;
      }

      /* ── inventário ── */
      #inv {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(11, 10, 16, 0.72);
        z-index: 20;
        font-family: monospace;
      }
      .inv-card {
        background: #17141f;
        border: 14px solid transparent;
        border-image: url("assets/ui/panel.png") 32 round;
        image-rendering: pixelated;
        padding: 12px 14px;
        width: min(640px, 94vw);
      }
      .inv-head {
        color: #e8c04d;
        font-size: 14px;
        margin-bottom: 12px;
        text-align: center;
      }
      .inv-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 8px;
      }
      .inv-slot {
        background: #0b0a10;
        border: 1px solid #2c2740;
        border-radius: 6px;
        min-height: 86px;
        padding: 6px;
        display: flex;
        flex-direction: column;
        gap: 4px;
        font-size: 11px;
      }
      .inv-slot.vazio {
        opacity: 0.35;
      }
      .inv-slot.alvo {
        cursor: pointer;
        border-color: #e8c04d;
      }
      .inv-icon {
        width: 32px;
        height: 32px;
        image-rendering: pixelated;
      }
      .cat-weapon {
        color: #cfd2d8;
      }
      .cat-armor {
        color: #8f9bb3;
      }
      .cat-potion {
        color: #b35de8;
      }
      .cat-scroll {
        color: #e8c04d;
      }
      .cat-food {
        color: #b3854d;
      }
      .inv-label {
        color: #e8e6f0;
        flex: 1;
      }
      .equipado {
        color: #5fce6b;
      }
      .inv-actions {
        display: flex;
        gap: 4px;
      }
      .inv-actions button {
        flex: 1;
        background: #4da3e8;
        color: #0b0a10;
        border: 0;
        border-radius: 3px;
        padding: 4px 2px;
        font-family: monospace;
        font-size: 10px;
        font-weight: bold;
        cursor: pointer;
      }
      .inv-actions button.secundario {
        background: #2c2740;
        color: #9a96ad;
      }
      .inv-hint {
        color: #55506b;
        font-size: 11px;
        text-align: center;
        margin-top: 10px;
      }

      /* ── tela de resultado ── */
      #result {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(11, 10, 16, 0.85);
        z-index: 30;
        font-family: monospace;
      }
      .result-card {
        background: #17141f;
        border: 14px solid transparent;
        border-image: url("assets/ui/panel.png") 32 round;
        image-rendering: pixelated;
        padding: 18px 26px;
        width: min(520px, 94vw);
        text-align: center;
      }
      .result-title {
        font-size: 28px;
        letter-spacing: 4px;
        margin: 4px 0 10px;
      }
      .result-title.vitoria {
        color: #5fce6b;
        text-shadow: 0 0 12px rgba(95, 206, 107, 0.45);
      }
      .result-title.derrota {
        color: #e8554d;
        text-shadow: 0 0 12px rgba(232, 85, 77, 0.45);
      }
      .result-sub {
        color: #9a96ad;
        font-size: 12px;
        margin: 2px 0;
      }
      .result-table {
        width: 100%;
        border-collapse: collapse;
        margin: 14px 0;
        font-size: 12px;
      }
      .result-table th {
        color: #55506b;
        font-weight: normal;
        text-align: center;
        padding: 4px 6px;
        border-bottom: 1px solid #2c2740;
      }
      .result-table td {
        color: #e8e6f0;
        text-align: center;
        padding: 5px 6px;
      }
      .result-btn {
        background: #4da3e8;
        color: #0b0a10;
        border: 0;
        border-radius: 4px;
        padding: 10px 22px;
        font-family: monospace;
        font-size: 13px;
        font-weight: bold;
        cursor: pointer;
        margin-top: 6px;
      }
      .result-btn:hover {
        filter: brightness(1.15);
      }

      /* ── chat ── */
      #chat {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 64px;
        display: flex;
        justify-content: center;
        z-index: 15;
      }
      #chat input {
        width: min(480px, 90vw);
        background: rgba(23, 20, 31, 0.95);
        color: #e8e6f0;
        border: 1px solid #4da3e8;
        border-radius: 6px;
        padding: 10px 12px;
        font-family: monospace;
        font-size: 13px;
        outline: none;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="ui"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
